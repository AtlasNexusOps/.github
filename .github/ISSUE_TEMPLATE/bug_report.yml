name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting! Please fill out the details below."
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See error..."
  - type: input
    id: version
    attributes:
      label: Version/commit
      placeholder: "e.g. v0.2.0 or commit sha"
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Low — cosmetic"
        - "Medium — workaround exists"
        - "High — blocking"
